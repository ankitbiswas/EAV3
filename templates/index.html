<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro - Personalized Fitness & Meal Planning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --gray: #6b7280;
            --white: #ffffff;
            --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 {
            font-size: 2.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        header p { color: var(--gray); font-size: 1.1rem; }
        .input-section {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }
        .input-section h2 { color: var(--dark); margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--white);
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        .allergen-section {
            background: #fef3c7;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #f59e0b;
        }
        .allergen-section h3 { color: #92400e; margin-bottom: 15px; font-size: 1.1rem; }
        .allergen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .allergen-checkbox { display: flex; align-items: center; gap: 8px; padding: 10px; background: white; border-radius: 8px; cursor: pointer; }
        .allergen-checkbox input { width: auto; cursor: pointer; }
        .allergen-checkbox span { font-size: 0.9rem; color: #92400e; }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3); }
        @media (max-width: 768px) {
            .form-row, .allergen-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏋️ FitPlan Pro</h1>
            <p>Your Personalized Fitness & Nutrition Solution</p>
        </header>

        <section class="input-section">
            <h2>Tell Us About Yourself</h2>
            <form action="/generate_plan" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age (years)</label>
                        <input type="number" id="age" name="age" min="15" max="100" placeholder="25" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" min="100" max="250" placeholder="175" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" min="30" max="300" placeholder="70" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="activity_level">Current Activity Level</label>
                    <select id="activity_level" name="activity_level" required>
                        <option value="">Select your activity level</option>
                        <option value="sedentary">Sedentary (little or no exercise)</option>
                        <option value="light">Lightly Active (1-3 days/week)</option>
                        <option value="moderate">Moderately Active (3-5 days/week)</option>
                        <option value="active">Very Active (6-7 days/week)</option>
                        <option value="extremely">Extremely Active (athlete)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fitness_goal">Primary Fitness Goal</label>
                    <select id="fitness_goal" name="fitness_goal" required>
                        <option value="">Select your goal</option>
                        <option value="weight_loss">Lose Weight</option>
                        <option value="muscle_gain">Build Muscle</option>
                        <option value="endurance">Improve Endurance</option>
                        <option value="flexibility">Improve Flexibility</option>
                        <option value="general">General Health & Fitness</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="diet_preference">Diet Preference</label>
                    <select id="diet_preference" name="diet_preference" required>
                        <option value="">Select diet preference</option>
                        <option value="non_veg">Non-Vegetarian</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="pescatarian">Pescatarian</option>
                    </select>
                </div>

                <div class="allergen-section">
                    <h3>⚠️ Any Allergies? (Select all that apply)</h3>
                    <p style="color: #92400e; margin-bottom: 15px; font-size: 0.9rem;">We'll customize your meal plan to avoid these ingredients</p>
                    <div class="allergen-grid">
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="peanuts"><span>Peanuts</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="tree_nuts"><span>Tree Nuts</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="dairy"><span>Milk/Dairy</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="eggs"><span>Eggs</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="wheat"><span>Wheat/Gluten</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="soy"><span>Soy</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="fish"><span>Fish</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="shellfish"><span>Shellfish</span></label>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Generate My Plan</button>
            </form>
        </section>
    </div>
</body>
</html>
