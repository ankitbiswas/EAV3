<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPlan Pro - Transform Your Fitness Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
        }
        .hero-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="%23666" stroke-width="0.5"/></svg>');
            opacity: 0.05;
            pointer-events: none;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }
        header { text-align: center; margin-bottom: 50px; }
        .logo-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        header h1 {
            font-family: 'Roboto Slab', serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 50%, #ff006e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(123, 47, 247, 0.3);
        }
        header p {
            font-size: 1.2rem;
            color: #a0a0b0;
            font-weight: 400;
            letter-spacing: 2px;
        }
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }
        .progress-step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #666;
        }
        .progress-step.active {
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            border-color: #00d4ff;
            color: white;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .card {
            background: linear-gradient(145deg, rgba(30, 30, 50, 0.9), rgba(20, 20, 40, 0.95));
            border-radius: 24px;
            padding: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-family: 'Roboto Slab', serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-align: center;
            color: #fff;
        }
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }
        .section-title span { font-size: 1.5rem; }
        .section-title h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #b0b0c0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input, select {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 1rem;
            color: #fff;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }
        input::placeholder { color: #666; }
        select option { background: #1a1a2e; color: #fff; }
        .allergen-section {
            background: linear-gradient(145deg, rgba(255, 183, 77, 0.1), rgba(255, 138, 101, 0.1));
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 183, 77, 0.3);
        }
        .allergen-section h3 {
            color: #ffb74d;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .allergen-section p { color: #888; font-size: 0.85rem; margin: 10px 0 20px; }
        .allergen-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .allergen-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .allergen-checkbox:hover {
            background: rgba(255, 183, 77, 0.2);
            border-color: rgba(255, 183, 77, 0.5);
        }
        .allergen-checkbox input { width: 18px; height: 18px; accent-color: #ffb74d; cursor: pointer; }
        .allergen-checkbox span { font-size: 0.85rem; color: #ddd; }
        .btn-primary {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #7b2ff7 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }
        @media (max-width: 768px) {
            .form-row, .allergen-grid { grid-template-columns: 1fr; }
            header h1 { font-size: 2rem; }
            .card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <div class="container">
        <header>
            <div class="logo-icon">💪</div>
            <h1>FitPlan Pro</h1>
            <p>Transform Your Body • Fuel Your Goals</p>
            <div class="progress-bar">
                <div class="progress-step active">1</div>
                <div class="progress-step">2</div>
                <div class="progress-step">3</div>
            </div>
        </header>

        <div class="card">
            <h2>🏃‍♂️ Start Your Transformation</h2>
            <form action="/generate_plan" method="POST">
                <div class="section-title"><span>👤</span><h3>Personal Details</h3></div>
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age">Age (years)</label>
                        <input type="number" id="age" name="age" min="15" max="100" placeholder="25" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" min="100" max="250" placeholder="175" required>
                    </div>
                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" min="30" max="300" placeholder="70" required>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 40px;"><span>🎯</span><h3>Fitness Profile</h3></div>

                <div class="form-group">
                    <label for="activity_level">Activity Level</label>
                    <select id="activity_level" name="activity_level" required>
                        <option value="">Select activity level</option>
                        <option value="sedentary">😴 Sedentary</option>
                        <option value="light">🚶 Lightly Active</option>
                        <option value="moderate">🏃 Moderately Active</option>
                        <option value="active">💪 Very Active</option>
                        <option value="extremely">🔥 Extremely Active (Athlete)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="fitness_goal">Primary Goal</label>
                    <select id="fitness_goal" name="fitness_goal" required>
                        <option value="">Select your goal</option>
                        <option value="weight_loss">🔥 Lose Weight</option>
                        <option value="muscle_gain">💪 Build Muscle</option>
                        <option value="endurance">⚡ Improve Endurance</option>
                        <option value="flexibility">🧘 Improve Flexibility</option>
                        <option value="general">🎯 General Health</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="diet_preference">Diet Preference</label>
                    <select id="diet_preference" name="diet_preference" required>
                        <option value="">Select diet</option>
                        <option value="non_veg">🍗 Non-Vegetarian</option>
                        <option value="vegetarian">🥬 Vegetarian</option>
                        <option value="vegan">🌱 Vegan</option>
                        <option value="pescatarian">🐟 Pescatarian</option>
                    </select>
                </div>

                <div class="allergen-section" style="margin-top: 30px;">
                    <h3>⚠️ Allergy Check</h3>
                    <p>Select any allergies - we'll filter meals accordingly</p>
                    <div class="allergen-grid">
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="peanuts"><span>🥜 Peanuts</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="tree_nuts"><span>🌰 Tree Nuts</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="dairy"><span>🥛 Dairy</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="eggs"><span>🥚 Eggs</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="wheat"><span>🌾 Wheat/Gluten</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="soy"><span>🫘 Soy</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="fish"><span>🐟 Fish</span></label>
                        <label class="allergen-checkbox"><input type="checkbox" name="allergens" value="shellfish"><span>🦐 Shellfish</span></label>
                    </div>
                </div>

                <button type="submit" class="btn-primary">🔥 Generate My Plan</button>
            </form>
        </div>
    </div>
</body>
</html>
